<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create account — PM Tool</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div class="brand-name">PM Tool</div>
      </div>
      <h1 style="font-size:22px;margin-bottom:6px;">Create your account</h1>
      <p style="color:var(--text-secondary);font-size:14px;margin:0 0 26px;">Start organizing projects with your team in minutes.</p>

      <form id="register-form" novalidate>
        <div class="field">
          <label for="fullName">Full name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Ada Lovelace" required>
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="ada" minlength="3" required autocomplete="username">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="ada@example.com" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat your password" minlength="8" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>

      <p style="text-align:center;font-size:13.5px;color:var(--text-secondary);margin-top:22px;">
        Already have an account? <a href="index.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
