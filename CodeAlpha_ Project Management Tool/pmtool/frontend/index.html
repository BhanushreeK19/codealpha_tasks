<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — PM Tool</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">P</div>
        <div class="brand-name">PM Tool</div>
      </div>
      <h1 style="font-size:22px;margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--text-secondary);font-size:14px;margin:0 0 26px;">Log in to get back to your boards.</p>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="usernameOrEmail">Username or email</label>
          <input type="text" id="usernameOrEmail" name="usernameOrEmail" placeholder="ada or ada@example.com" required autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>

      <p style="text-align:center;font-size:13.5px;color:var(--text-secondary);margin-top:22px;">
        Don't have an account? <a href="register.html">Create one</a>
      </p>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
