server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pm-tool-backend

  datasource:
    url: jdbc:mysql://localhost:3306/pmtool_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_mysql_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # use 'validate' once schema.sql has been run manually in production
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:b3JnLnBtdG9vbC5zZWN1cmUuandzLnNpZ25pbmcua2V5LmNoYW5nZS1pbi1wcm9kdWN0aW9uLXBsZWFzZS1tYWtlLWl0LWxvbmdlcg==}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}        # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:8081}

logging:
  level:
    com.pmtool: DEBUG
    org.springframework.security: INFO
